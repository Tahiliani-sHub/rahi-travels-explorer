[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy all /api/* requests to the Railway backend.
# After deploying to Railway, replace the placeholder URL below with your actual
# Railway service URL (e.g. https://rahi-travels-explorer.up.railway.app).
[[redirects]]
  from = "/api/*"
  to = "https://rahi-travels-explorer-production-07a0.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback — every unmatched route serves index.html so the
# client-side router (TanStack Router) can handle it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
